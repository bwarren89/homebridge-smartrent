name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run tsc

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          # Fail if src/ files are accidentally included in the tarball
          if grep -q "src/" pack-output.txt; then
            echo "::error::src/ directory found in package tarball. Remove it from the files array in package.json."
            exit 1
          fi
